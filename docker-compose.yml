version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: lfwlw-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - lfwlw-network
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: lfwlw-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - lfwlw-network
    restart: unless-stopped

  backend:
    image: node:18-alpine
    container_name: lfwlw-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=prod-secret-key-2024
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=*
    command: sh -c "npm install && npm run dev"
    networks:
      - lfwlw-network
    restart: unless-stopped

networks:
  lfwlw-network:
    driver: bridge