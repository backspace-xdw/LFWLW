<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 外层边框渐变 -->
    <linearGradient id="outerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.3" />
      <stop offset="25%" style="stop-color:#2e7fd9;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#2e7fd9;stop-opacity:0.8" />
      <stop offset="75%" style="stop-color:#2e7fd9;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0.3" />
    </linearGradient>

    <!-- 内层边框渐变 -->
    <linearGradient id="innerGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6bb6ff;stop-opacity:0.2" />
      <stop offset="25%" style="stop-color:#4a9eff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#4a9eff;stop-opacity:0.6" />
      <stop offset="75%" style="stop-color:#4a9eff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6bb6ff;stop-opacity:0.2" />
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外层八边形边框 -->
  <path d="M 225 0 L 775 0 L 1000 225 L 1000 775 L 775 1000 L 225 1000 L 0 775 L 0 225 Z"
        fill="none"
        stroke="url(#outerGradient)"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- 内层八边形边框 -->
  <path d="M 235 10 L 765 10 L 990 235 L 990 765 L 765 990 L 235 990 L 10 765 L 10 235 Z"
        fill="none"
        stroke="url(#innerGradient)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.7" />
</svg>
