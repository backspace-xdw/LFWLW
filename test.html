<!DOCTYPE html>
<html>
<head>
    <title>LFWLW 连接测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>LFWLW 物联网平台连接测试</h1>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'status ' + type;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // 测试前端连接
        addResult('正在测试前端连接...');
        
        fetch('/')
            .then(response => {
                if (response.ok) {
                    addResult('✓ 前端服务连接成功 (HTTP ' + response.status + ')', 'success');
                    return response.text();
                } else {
                    addResult('✗ 前端服务连接失败 (HTTP ' + response.status + ')', 'error');
                }
            })
            .then(html => {
                if (html && html.includes('本安仪表监控管理平台')) {
                    addResult('✓ 前端页面加载成功', 'success');
                }
            })
            .catch(error => {
                addResult('✗ 前端连接错误: ' + error.message, 'error');
            });
        
        // 测试API连接
        setTimeout(() => {
            addResult('正在测试后端API连接...');
            
            fetch('/api/health')
                .then(response => {
                    if (response.ok) {
                        addResult('✓ 后端API连接成功', 'success');
                        return response.json();
                    } else {
                        addResult('✗ 后端API连接失败 (HTTP ' + response.status + ')', 'error');
                    }
                })
                .then(data => {
                    if (data) {
                        addResult('✓ API响应: ' + JSON.stringify(data), 'success');
                    }
                })
                .catch(error => {
                    addResult('✗ API连接错误: ' + error.message, 'error');
                });
        }, 1000);
        
        // 显示访问信息
        setTimeout(() => {
            addResult('');
            addResult('访问地址:');
            addResult('本地: http://localhost:50000');
            addResult('外网: http://ljinvestment.diskstation.me:50000');
            addResult('登录: admin / admin123');
        }, 2000);
    </script>
</body>
</html>
