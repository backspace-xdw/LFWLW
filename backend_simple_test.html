<!DOCTYPE html>
<html>
<head>
    <title>后端API简单测试</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>测试后端API</h1>
    <p>后端地址: http://ljinvestment.diskstation.me:50001</p>
    
    <button onclick="test()">点击测试登录API</button>
    <div id="result"></div>
    
    <script>
        function test() {
            fetch('http://ljinvestment.diskstation.me:50001/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: 'admin',
                    password: 'admin123'
                })
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('result').innerHTML = '<pre>' + data + '</pre>';
            })
            .catch(error => {
                document.getElementById('result').innerHTML = '错误: ' + error;
            });
        }
    </script>
</body>
</html>
