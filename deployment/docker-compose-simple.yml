version: '3.8'

services:
  # 后端服务
  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../backend:/app
    environment:
      - NODE_ENV=production
      - PORT=50001
      - HOST=0.0.0.0
      - JWT_SECRET=your-production-secret-change-this
      - JWT_REFRESH_SECRET=your-refresh-secret-change-this
      - CORS_ORIGIN=*
    ports:
      - "50001:50001"
    command: sh -c "npm install && node src/index.js"
    restart: unless-stopped

  # 前端服务
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    environment:
      - NODE_ENV=production
    ports:
      - "50000:50000"
    command: sh -c "npm install && npm run build && npx serve -s dist -l 50000"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped